# docker-compose.yml
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: proyecto_mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"  # Para usar root sin password
      MYSQL_DATABASE: tiendaplazachina    # Mismo nombre que usas
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - proyecto_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build: . 
    container_name: proyecto_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Estas variables sobreescriben las del properties
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tiendaplazachina?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SERVER_PORT: 8080
    ports:
      - "8081:8080"  # Mismo puerto que usas
    networks:
      - proyecto_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: proyecto_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ""
    ports:
      - "8082:80"
    depends_on:
      - mysql
    networks:
      - proyecto_network

volumes:
  mysql_data:

networks:
  proyecto_network:
    driver: bridge