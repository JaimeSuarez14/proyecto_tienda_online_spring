name: Java CI with Maven

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Instalar Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install -y docker-compose
        docker-compose --version

    - name: Compilar con Maven
      run: mvn clean compile

    - name: Verificar compilación
      run: |
          if [ -d "target" ]; then
            echo "✅ Compilación exitosa - Directorio target creado"
            ls -la target/
          else
            echo "❌ Error: No se creó el directorio target"
            exit 1
          fi

    - name: Empaquetar con Maven
      run: mvn clean package
      continue-on-error: true

    - name: Subir artefacto
      uses: actions/upload-artifact@v4
      with:
        name: app-build
        path: target/*.jar
      continue-on-error: true

    # PUNTO 4: Análisis de calidad con SonarCloud
    - name: Analizar con SonarCloud
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
          echo "=== ANALIZANDO CON SONARCLOUD ==="
          echo "Repositorio: proyecto_tienda_online_spring"
          echo "Evento: ${{ github.event_name }}"
          
          # Verificar que el token existe
          if [ -z "$SONAR_TOKEN" ]; then
            echo "ERROR: SONAR_TOKEN no está configurado"
            echo "Ve a Settings > Secrets and variables > Actions y crea SONAR_TOKEN"
            exit 1
          fi
          mvn verify sonar:sonar \
            -Dsonar.projectKey=DesarrolloDigitalPeru_proyecto_tienda_online_spring \
            -Dsonar.organization=desarrollodigitalperu \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # Validar Dockerfile 
    - name: Validar Dockerfile
      run: |
          echo "========================================="
          echo "PUNTO 1: VALIDAR DOCKERFILE"
          echo "========================================="
          
          # Verificar que Dockerfile existe
          if [ -f "Dockerfile" ]; then
            echo "✅ Dockerfile encontrado"
          else
            echo "❌ Dockerfile no encontrado - Creando archivo Dockerfile"
            echo "FROM eclipse-temurin:21-jre-alpine" > Dockerfile
            echo "COPY target/*.jar app.jar" >> Dockerfile
            echo "EXPOSE 8080" >> Dockerfile
            echo "ENTRYPOINT [\"java\", \"-jar\", \"app.jar\"]" >> Dockerfile
            echo "✅ Dockerfile creado automáticamente"
          fi
          
          # Verificar sintaxis del Dockerfile
          echo "Verificando sintaxis del Dockerfile..."
          docker build -t test-validate --no-cache --quiet . || exit 1
          echo "✅ Sintaxis del Dockerfile válida"
          
          echo "========================================="

    # Construir imagen Docker
    - name: Construir imagen Docker
      run: |
          echo "========================================="
          echo "CONSTRUYENDO IMAGEN DOCKER"
          echo "========================================="
          
          # Construir imagen con tag del commit
          docker build -t proyecto-tienda:${{ github.sha }} .
          docker build -t proyecto-tienda:latest .
          
          # Mostrar imágenes creadas
          echo "Imágenes creadas:"
          docker images | grep proyecto-tienda
          
          echo "✅ Imagen Docker construida exitosamente"
          echo "========================================="
    
    # Validar docker-compose.yml
    - name: Validar docker-compose.yml
      run: |
          echo "========================================="
          echo "PUNTO 2: VALIDAR DOCKER-COMPOSE"
          echo "========================================="
          
          # Verificar que docker-compose.yml existe
          if [ -f "docker-compose.yml" ]; then
            echo "✅ docker-compose.yml encontrado"
          else
            echo "❌ docker-compose.yml no encontrado"
            exit 1
          fi
          
          # Validar sintaxis
          echo "Validando sintaxis..."
          docker-compose config || exit 1
          echo "✅ Sintaxis válida"
          
          # Verificar servicios definidos
          echo "Servicios definidos:"
          docker-compose config --services
          
          echo "========================================="

    # Validar variables de entorno
    - name: Validar variables de entorno
      run: |
          echo "========================================="
          echo "PUNTO 3: VALIDAR VARIABLES DE ENTORNO"
          echo "========================================="
          
          # Verificar que .env.example existe
          if [ -f ".env.example" ]; then
            echo "✅ .env.example encontrado"
          else
            echo "❌ .env.example no encontrado"
            exit 1
          fi
          
          # Mostrar configuración esperada
          echo "Configuración esperada:"
          echo "  Base de datos: tiendaplazachina"
          echo "  Usuario: root"
          echo "  Password: (vacío)"
          
          # Verificar que el archivo contiene la configuración correcta
          if grep -q "tiendaplazachina" .env.example; then
            echo "✅ Nombre BD correcto en .env.example"
          else
            echo "❌ Nombre BD incorrecto en .env.example"
          fi
          
          echo "========================================="          
    - name: Empaquetar aplicación
      run: mvn package -DskipTests
      
    - name: Subir artefacto (JAR generado)
      uses: actions/upload-artifact@v4
      with:
          name: proyecto-tienda-jar
          path: target/*.jar
          retention-days: 30